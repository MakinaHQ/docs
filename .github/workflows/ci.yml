name: PR check
on: [pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install modules
        run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build